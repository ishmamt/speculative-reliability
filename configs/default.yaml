mode: v0  # v0 | v1

dataset:
  name: swebench_lite
  subset_size: 50
  seed: 42
  manifest_path: data/instance_manifest.json
  exclude_repos:  # compiled C-extension repos our git-worktree sandbox can't build; see README Limitations
    - matplotlib/matplotlib
    - scikit-learn/scikit-learn
    - astropy/astropy

models:
  actor: Qwen/Qwen2.5-Coder-7B-Instruct
  speculator: Qwen/Qwen2.5-Coder-1.5B-Instruct  # v1 only

signal:
  confidence_threshold: -0.2330  # set via calibration script before first full run
  k_default: 1
  k_uncertain: 3
  alt_temperature: 0.8

sandbox:
  test_timeout_seconds: 120
  worktree_base_dir: /tmp/sbx_worktrees

logging:
  log_dir: results/logs
  log_level: INFO

output:
  results_dir: results/reports

calibration:
  num_instances: 20

pipeline:
  max_steps: 30  # safety cap on trajectory length; real trajectories end at submit_patch
  max_observation_chars: 2000  # truncation limit for read_file content fed back into the prompt
